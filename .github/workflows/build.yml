name: INFINITY_GOD_MODE_BUILD
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🥷 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🏗️ Pembangunan Wadah & Tambal Kode Otomatis
        run: |
          # Buat struktur folder standar (WAJIB)
          mkdir -p app/src/main/java/com/infinity/app
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values

          # Pindahin semua file .java dan .xml ke tempatnya
          find . -name "*.java" -exec cp {} app/src/main/java/com/infinity/app/ \;
          find . -name "*.xml" -not -path "./app/*" -exec cp {} app/src/main/res/layout/ \;
          mv app/src/main/res/layout/AndroidManifest.xml app/src/main/ 2>/dev/null || true
          mv app/src/main/res/layout/strings.xml app/src/main/res/values/ 2>/dev/null || true

          # --- TAMBALAN OTOMATIS (Biar gak eror kalo file kurang) ---
          if [ ! -f "app/src/main/res/values/strings.xml" ]; then
            echo '<resources><string name="app_name">InfinityApp</string></resources>' > app/src/main/res/values/strings.xml
          fi
          
          # Buat build.gradle yang "Kebal" (Abaikan Error Lint & Warning)
          cat <<EOF > build.gradle
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.0' }
          }
          allprojects { repositories { google(); mavenCentral() } }
          EOF

          cat <<EOF > app/build.gradle
          plugins { id 'com.android.application' }
          android {
              namespace 'com.infinity.app'
              compileSdk 34
              defaultConfig {
                  applicationId "com.infinity.app"
                  minSdk 21
                  targetSdk 34
              }
              lintOptions {
                  checkReleaseBuilds false
                  abortOnError false # INI KUNCINYA: Jangan berhenti kalo ada eror dikit!
              }
          }
          EOF
          echo "include ':app'" > settings.gradle

      - name: 🛠️ Build APK Paksa (Force Mode)
        run: |
          sudo apt-get update && sudo apt-get install gradle -y
          # Gunakan mode 'continue' biar tetep jalan walau ada task yang gagal
          gradle assembleRelease --continue || echo "ADA EROR TAPI GUE COBA CARI HASILNYA!"

      - name: 📦 Kirim APK Gacor
        uses: actions/upload-artifact@v4
        with:
          name: APK-INFINITY-FINAL
          path: "**/*.apk"
          if-no-files-found: warn

